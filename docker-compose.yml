version: '3.8'

# TYPO3 Dentist Directory MVP - Bucharest
# A scalable platform for managing and selling access to a curated dentist directory

services:
  # PostgreSQL Database Service
  database:
    image: postgres:15-alpine
    container_name: typo3-dentist-db
    environment:
      POSTGRES_DB: ${DB_NAME:-typo3_dentist}
      POSTGRES_USER: ${DB_USER:-typo3}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-typo3secure123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-typo3}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - typo3-network
    restart: unless-stopped

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: typo3-dentist-cache
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - typo3-network
    restart: unless-stopped

  # TYPO3 Application Service (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: typo3-dentist-app
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # TYPO3 Configuration
      TYPO3_CONTEXT: ${TYPO3_CONTEXT:-Production/Live}
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-typo3_dentist}
      DB_USER: ${DB_USER:-typo3}
      DB_PASSWORD: ${DB_PASSWORD:-typo3secure123}

      # TYPO3 Trust Host Pattern
      TYPO3_INSTALL_SITE_NAME: ${SITE_NAME:-Dentist Directory Bucharest}
      TRUSTED_HOSTS_PATTERN: ${TRUSTED_HOSTS_PATTERN:-.*\.localhost}

      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Email Configuration
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}

      # PHP Environment
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-300}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-50M}

    volumes:
      - ./:/app
      - ./var/cache:/app/var/cache
      - ./var/log:/app/var/log
      - ./public:/app/public
      - ./fileadmin:/app/fileadmin
      - ./typo3conf:/app/typo3conf
      - ./typo3temp:/app/typo3temp
    ports:
      - "9000:9000"
    networks:
      - typo3-network
    restart: unless-stopped

  # Nginx Web Server
  web:
    image: nginx:1.25-alpine
    container_name: typo3-dentist-web
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./public:/app/public:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    environment:
      TYPO3_HOST: ${TYPO3_HOST:-localhost}
    networks:
      - typo3-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MailHog for Email Testing (Development only)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: typo3-dentist-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - typo3-network
    restart: unless-stopped

  # phpMyAdmin for Database Management (Development only)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: typo3-dentist-phpmyadmin
    depends_on:
      - database
    environment:
      PMA_HOST: database
      PMA_USER: ${DB_USER:-typo3}
      PMA_PASSWORD: ${DB_PASSWORD:-typo3secure123}
      PMA_PORT: 5432
      UPLOAD_LIMIT: 1073741824
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    networks:
      - typo3-network
    restart: unless-stopped

networks:
  typo3-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local

