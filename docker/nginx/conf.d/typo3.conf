# TYPO3 Site Configuration for Nginx

# Upstream to PHP-FPM
upstream php-fpm {
    server app:9000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    server_tokens off;

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /app/public;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server Block (SSL configuration placeholder)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;
    server_tokens off;

    # SSL configuration (uncomment when certificates are available)
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    # For development without SSL, comment out redirect above and add:
    listen 80;

    root /app/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logging
    access_log /var/log/nginx/typo3-access.log;
    error_log /var/log/nginx/typo3-error.log warn;

    # Deny access to system files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to TYPO3 configuration
    location ~ ^/(typo3conf|typo3/sysext|typo3/dev|fileadmin) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common malware attempts
    location ~ /(wp-admin|wp-login|xmlrpc) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Frontend routes - pass to PHP
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP execution
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # TYPO3 specific parameters
        fastcgi_param TYPO3_CONTEXT ${TYPO3_CONTEXT:-Production/Live};
        fastcgi_param DB_HOST ${DB_HOST:-database};
        fastcgi_param DB_NAME ${DB_NAME:-typo3_dentist};
        fastcgi_param DB_USER ${DB_USER:-typo3};
        fastcgi_param REDIS_HOST ${REDIS_HOST:-redis};

        # Timeouts
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;

        # Buffering
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    # Deny direct access to other executable files
    location ~ \.(php[~0-9s]|phtml)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

